<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Розрахунок вартості спільного замовлення</title>
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: rgba(245, 247, 250, 0.9);
      backdrop-filter: blur(5px);
    }

    .background {
      background-image: url('background.png');
      background-size: cover;
      background-position: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .container {
      max-width: 640px;
      width: 100%;
      padding: 24px 20px 20px;
      border-radius: 14px;
      background-color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* Анімація логотипа: легкий "float + pulse" */
    @keyframes logoFloat {
      0% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-3px) scale(1.04);
      }
      100% {
        transform: translateY(0) scale(1);
      }
    }

    .logo {
      width: 52px;
      height: auto;
      display: inline-block;
      animation: logoFloat 3s ease-in-out infinite;
      transition: transform 0.2s;
    }

    .logo:hover {
      transform: translateY(-4px) scale(1.08);
    }

    h2 {
      font-size: 22px;
      margin: 0;
      text-align: center;
      letter-spacing: 0.3px;
    }

    label {
      font-weight: bold;
      font-size: 18px;
      text-align: center;
      display: block;
      margin-bottom: 10px;
    }

    .subtitle {
      margin: 4px 0 12px;
      font-size: 13px;
      color: #666;
      text-align: center;
    }

    .exchange-rate-container {
      text-align: center;
      margin-bottom: 18px;
    }

    .exchange-rate-container label {
      display: block;
      margin-bottom: 5px;
    }

    #exchange-rate {
      width: auto;
      padding: 8px 10px;
      font-size: 16px;
      font-weight: bold;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: #f1f9ff;
      text-align: center;
      display: inline-block;
    }

    .figure-blocks-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    .figure-block {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
      margin-bottom: 0;
    }

    .figure-block input {
      width: 110px;
      padding: 8px 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #d0d7e2;
      background-color: #f9fbff;
      transition: border-color 0.15s, box-shadow 0.15s, background-color 0.15s;
    }

    .figure-block input:focus {
      outline: none;
      border-color: #7da4ff;
      background-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(125, 164, 255, 0.2);
    }

    .figure-block button {
      background-color: #ff6b6b;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      width: 40px;
      font-weight: bold;
      transition: background-color 0.15s, transform 0.1s;
    }

    .figure-block button:hover {
      background-color: #e15555;
    }

    .figure-block button:active {
      transform: scale(0.96);
    }

    .total-sum {
      font-weight: bold;
      font-size: 20px;
      text-align: center;
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      background-color: #f5f8ff;
      border: 1px solid #dbe4ff;
    }

    .aggregated-data {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      color: #555;
    }

    .aggregated-data p {
      margin: 4px 0;
    }

    .community-note {
      font-size: 12px;
      text-align: center;
      margin-top: 4px;
      color: #777;
    }

    .note {
      font-size: 14px;
      background-color: #f1f9ff;
      border: 1px solid #d6e9ff;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }

    .note-title {
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
    }

    .note-description {
      margin-bottom: 10px;
      text-align: center;
    }
